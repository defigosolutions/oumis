<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1228;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1b3d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b5de5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8207a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="300" cy="300" r="180" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="300" cy="300" r="140" fill="none" stroke="#f4a7c3" stroke-width="1" opacity="0.2"/>
  <!-- Hair scissors icon -->
  <g transform="translate(300,280)" fill="none" stroke="#f4a7c3" stroke-width="3" stroke-linecap="round">
    <!-- Scissors body -->
    <circle cx="-30" cy="-30" r="18" fill="rgba(244,167,195,0.15)" stroke="#f4a7c3"/>
    <circle cx="30" cy="-30" r="18" fill="rgba(244,167,195,0.15)" stroke="#f4a7c3"/>
    <line x1="-15" y1="-18" x2="40" y2="50"/>
    <line x1="15" y1="-18" x2="-40" y2="50"/>
    <!-- Screw bolt -->
    <circle cx="0" cy="15" r="5" fill="#9b5de5" stroke="none"/>
  </g>
  <!-- Sparkle dots -->
  <circle cx="150" cy="150" r="3" fill="#f4a7c3" opacity="0.6"/>
  <circle cx="450" cy="120" r="2" fill="#9b5de5" opacity="0.5"/>
  <circle cx="500" cy="400" r="4" fill="#e8207a" opacity="0.4"/>
  <circle cx="100" cy="500" r="3" fill="#d4b8f0" opacity="0.5"/>
  <circle cx="480" cy="600" r="2" fill="#f4a7c3" opacity="0.4"/>
  <!-- Salon name -->
  <text x="300" y="520" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#f4a7c3" opacity="0.9">Wido's Hair Salon</text>
  <text x="300" y="550" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#9d8fb5" letter-spacing="3">HAMDEN · CT</text>
  <!-- Bottom gradient bar -->
  <rect x="150" y="580" width="300" height="2" fill="url(#accent)" rx="1" opacity="0.6"/>
  <!-- Bottom tag -->
  <text x="300" y="620" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#9d8fb5" opacity="0.7">Image loading...</text>
  <text x="300" y="640" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#9d8fb5" opacity="0.5">Add photos to src/assets/</text>
</svg>
